<!DOCTYPE html>
<html lang="en">

<head>
  <title>Home - Liassica's Site</title>
  <link href="/css/style.css" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/images/grszh_icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Home">
  <style>
    main {
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <a class="active" href="/index.html">Home</a>
    <a href="/posts.html">Posts & Guides</a>
    <a href="/music.html">Music</a>
    <a href="/links.html">Links</a>
    <a href="/grszh.html">Grszh Gallery</a>
    <a href="/about.html">About</a>
  </div>
  <main>
    <div class="row">
      <div class="col-4 col-s-2"></div>
      <div class="col-4 col-s-8">
        <img src="/images/grszh/grszh00.png" alt="A picture of a white cat, dubbed Grszh. The cat is on a table in a room in front of some shut blinds. The cat is staring at the camera ominously.">
      </div>
      <div class="col-4 col-s-2"></div>
    </div>

    <div class="row">
      <div class="col-12 col-s-12">
        <div id='GarfRing'>
          <script type="text/javascript" src="https://garfring.neocities.org/onionring-variables.js"></script>
          <script type="text/javascript" src="/js/onionring-widget.js"></script>
        </div>
      </div>
    </div>
    
    <footer>
      <p>
        You are currently on <span id="hostname"></span>.
      </p>
      <p>
        Click to go to the <span id="mirror-link"></span>.
      </p>
    </footer>

    <script>
      let hostname = window.location.hostname;
      if (hostname == 'liassica.neocities.org') {
        document.getElementById("hostname").innerHTML = 'the NeoCities mirror'
        document.getElementById("mirror-link").innerHTML = '<a href="https://liassica.github.io/">GitHub Pages mirror</a>';
      } else if (hostname == 'liassica.github.io') {
        document.getElementById("hostname").innerHTML = 'the GitHub Pages mirror'
        document.getElementById("mirror-link").innerHTML = '<a href="https://liassica.neocities.org/">NeoCities mirror</a>';
      }
      else {
        document.getElementById("hostname").innerHTML = "someone else's site"
        document.getElementById("mirror-link").innerHTML = '<a href="https://liassica.neocities.org/">NeoCities mirror</a> or the <a href="https://liassica.github.io/">GitHub Pages mirror</a>';
      }
    </script>
  </main>
</body>

</html>
