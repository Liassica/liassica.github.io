    <script>
      let hostname = window.location.hostname;
      if (hostname == 'liassica.neocities.org') {
        document.getElementById("hostname").innerHTML = 'You are currently on the NeoCities mirror.'
        document.getElementById("mirror-link").innerHTML = 'Click to go to the <a href="https://liassica.github.io/">GitHub pages mirror.</a>';
      } else if (hostname == 'liassica.github.io') {
        document.getElementById("hostname").innerHTML = 'You are currently on the GitHub Pages mirror.'
        document.getElementById("mirror-link").innerHTML = 'Click to go to the <a href="https://liassica.neocities.org/">NeoCities mirror.</a>';
      }
      else {
        document.getElementById("hostname").innerHTML = "You are currently on someone else's site."
        document.getElementById("mirror-link").innerHTML = 'Click to go to the <a href="https://liassica.neocities.org/">NeoCities mirror</a> or the <a href="https://liassica.github.io/">GitHub pages mirror.</a>';
